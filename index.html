<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:'Press Start 2P', cursive;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:40px;
    font-size:22px;
}

button{
    font-family:'Press Start 2P', cursive;
    padding:15px 35px;
    margin:10px;
    border:2px solid #fff;
    background:#000;
    color:#fff;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#fff;
    color:#000;
}

#love{
    display:none;
    font-size:40px;
    color:#ff3b6b;
    margin-top:40px;
    animation:fade .6s;
}

.heart{
    font-size:90px;
    display:inline-block;
    animation:beat .8s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>DO YOU LOVE ME?</h1>

    <div id="buttons">
        <button id="yes">YES</button>
        <button id="no">NO</button>
    </div>

    <div id="love">
        <div>I LOVE YOU</div>
        <div class="heart">❤️</div>
    </div>
</div>

<script>
const yes=document.getElementById("yes");
const no=document.getElementById("no");
const love=document.getElementById("love");
const buttons=document.getElementById("buttons");

// Khi bấm NO, nút NO sẽ đổi thành YES
no.onclick=function(){
    no.innerText="YES";
};

// Khi bấm YES hoặc nút NO đã đổi thành YES
buttons.addEventListener("click",function(e){
    if(e.target.tagName==="BUTTON" &&
      (e.target.innerText==="YES")){
        buttons.style.display="none";
        love.style.display="block";
    }
});
</script>

</body>
</html>
